<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Share Cards - Being Genuinely Useful</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Newsreader:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a0a;
            --bg-secondary: #141414;
            --bg-tertiary: #1a1a1a;
            --text-primary: #fafafa;
            --text-secondary: #a1a1aa;
            --text-muted: #71717a;
            --accent: #22c55e;
            --accent-hover: #16a34a;
            --border: #27272a;
            --border-subtle: #1f1f23;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
        }

        /* Navigation */
        .nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-subtle);
            padding: 0 24px;
        }

        .nav-inner {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 64px;
        }

        .nav-logo {
            font-family: 'Newsreader', serif;
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text-primary);
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            gap: 32px;
            list-style: none;
        }

        .nav-links a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.875rem;
            font-weight: 500;
            transition: color 0.2s;
        }

        .nav-links a:hover {
            color: var(--text-primary);
        }

        .nav-cta {
            background: var(--accent);
            color: var(--bg-primary);
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 0.875rem;
            font-weight: 600;
            text-decoration: none;
            transition: background 0.2s;
        }

        .nav-cta:hover {
            background: var(--accent-hover);
        }

        /* Main */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 120px 24px 80px;
        }

        /* Header */
        .page-header {
            text-align: center;
            margin-bottom: 64px;
        }

        .page-header h1 {
            font-family: 'Newsreader', serif;
            font-size: clamp(2rem, 5vw, 3rem);
            font-weight: 500;
            margin-bottom: 16px;
        }

        .page-header p {
            color: var(--text-secondary);
            font-size: 1.125rem;
            max-width: 500px;
            margin: 0 auto;
        }

        /* Filter Pills */
        .filters {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-bottom: 48px;
            flex-wrap: wrap;
        }

        .filter-btn {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 8px 16px;
            border-radius: 100px;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .filter-btn:hover {
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }

        .filter-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: var(--bg-primary);
        }

        /* Cards Grid */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 24px;
        }

        /* Card */
        .card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 28px;
            display: flex;
            flex-direction: column;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--card-accent, var(--accent));
        }

        .card:hover {
            transform: translateY(-4px);
            border-color: var(--card-accent, var(--accent));
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .card[data-color="green"] { --card-accent: #22c55e; }
        .card[data-color="blue"] { --card-accent: #3b82f6; }
        .card[data-color="orange"] { --card-accent: #f59e0b; }
        .card[data-color="purple"] { --card-accent: #a855f7; }

        .card-number {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 16px;
        }

        .card-quote {
            font-family: 'Newsreader', serif;
            font-size: 1.25rem;
            font-style: italic;
            line-height: 1.5;
            color: var(--text-primary);
            flex-grow: 1;
            margin-bottom: 20px;
        }

        .card-source {
            font-size: 0.875rem;
            color: var(--text-muted);
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .card-source::before {
            content: '';
            width: 24px;
            height: 1px;
            background: var(--border);
        }

        .card-buttons {
            display: flex;
            gap: 8px;
        }

        .card-btn {
            flex: 1;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 10px 16px;
            border: none;
            border-radius: 8px;
            font-size: 0.8125rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .card-btn.copy {
            background: var(--accent);
            color: var(--bg-primary);
        }

        .card-btn.copy:hover {
            background: var(--accent-hover);
        }

        .card-btn.share {
            background: var(--bg-tertiary);
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }

        .card-btn.share:hover {
            background: var(--border);
            color: var(--text-primary);
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--bg-secondary);
            border: 1px solid var(--accent);
            color: var(--text-primary);
            padding: 16px 24px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 1000;
            opacity: 0;
            transition: all 0.3s ease;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .toast-icon {
            width: 20px;
            height: 20px;
            background: var(--accent);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .toast-icon svg {
            width: 12px;
            height: 12px;
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 64px 24px;
            border-top: 1px solid var(--border-subtle);
            color: var(--text-muted);
        }

        footer p {
            margin-bottom: 8px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .nav-links {
                display: none;
            }

            .container {
                padding: 100px 16px 60px;
            }

            .cards-grid {
                grid-template-columns: 1fr;
            }

            .card {
                padding: 24px;
            }

            .card-quote {
                font-size: 1.125rem;
            }
        }
    </style>
</head>
<body>
    <nav class="nav">
        <div class="nav-inner">
            <a href="/" class="nav-logo">Being Genuinely Useful</a>
            <ul class="nav-links">
                <li><a href="/#framework">Framework</a></li>
                <li><a href="/#systems">Systems</a></li>
                <li><a href="/#exercises">Exercises</a></li>
                <li><a href="/cards">Cards</a></li>
            </ul>
            <a href="/#download" class="nav-cta">Get the Book</a>
        </div>
    </nav>

    <main class="container">
        <header class="page-header">
            <h1>Share Cards</h1>
            <p>Click to copy. Share ideas that matter on Twitter, LinkedIn, and anywhere else.</p>
        </header>

        <div class="filters">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="Panos Kokmotos">Panos</button>
            <button class="filter-btn" data-filter="David Deutsch">Deutsch</button>
            <button class="filter-btn" data-filter="Naval Ravikant">Naval</button>
        </div>

        <div class="cards-grid" id="cardsContainer"></div>
    </main>

    <footer>
        <p>&copy; 2026 Panos Kokmotos &amp; Sophos</p>
        <p>Read, learn, build something useful.</p>
    </footer>

    <div class="toast" id="toast">
        <span class="toast-icon">
            <svg fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"/></svg>
        </span>
        <span id="toastMessage">Copied to clipboard!</span>
    </div>

    <script>
        const cards = [
            {
                quote: "The difference between a useful system and a useless one is not intelligence. It's specificity.",
                source: "Panos Kokmotos",
                color: "green"
            },
            {
                quote: "If it applies everywhere, it applies nowhere. Specificity is the antidote to uselessness.",
                source: "Panos Kokmotos",
                color: "green"
            },
            {
                quote: "A good explanation is hard to vary. Change any element and it breaks. The parts are essential.",
                source: "David Deutsch",
                color: "purple"
            },
            {
                quote: "Good explanations don't just resist variation. They reach far beyond where they started.",
                source: "David Deutsch",
                color: "purple"
            },
            {
                quote: "The most valuable knowledge can't be trained. It's specific, developed through curiosity and obsession.",
                source: "Naval Ravikant",
                color: "orange"
            },
            {
                quote: "In an AI world, general knowledge is obsolete. Only specific knowledge from your obsessions remains valuable.",
                source: "Naval Ravikant",
                color: "orange"
            },
            {
                quote: "Real usefulness is quiet. It does the work. It doesn't announce itself.",
                source: "Panos Kokmotos",
                color: "blue"
            },
            {
                quote: "Most AI systems are optimized for engagement, not usefulness. These are opposites.",
                source: "Panos Kokmotos",
                color: "green"
            },
            {
                quote: "Most problems don't need more information. They need better compression.",
                source: "Panos Kokmotos",
                color: "blue"
            },
            {
                quote: "In-kind giving works because it respects expertise. The person on the ground knows what's needed.",
                source: "Panos Kokmotos",
                color: "green"
            },
            {
                quote: "True usefulness means: You stay in control. I help you execute your judgment, not replace it.",
                source: "Panos Kokmotos",
                color: "blue"
            },
            {
                quote: "The future isn't better engagement. It's transparent problems, better thinking, and knowledge at scale.",
                source: "Panos Kokmotos",
                color: "purple"
            },
            {
                quote: "Knowledge grows through conjecture and criticism. Not through observation alone.",
                source: "David Deutsch",
                color: "purple"
            },
            {
                quote: "Problems are soluble. There exists an explanation that hasn't been found yet.",
                source: "David Deutsch",
                color: "purple"
            },
            {
                quote: "Be useful, not engaging. Build infrastructure, not platforms. Create knowledge, not content.",
                source: "Panos Kokmotos",
                color: "orange"
            },
            {
                quote: "Compression is a human skill. AI can expand. Humans must compress.",
                source: "Panos Kokmotos",
                color: "blue"
            },
            {
                quote: "A useful AI system gives you one clear answer and then gets out of the way.",
                source: "Panos Kokmotos",
                color: "green"
            },
            {
                quote: "You can measure what's easy. But that usually isn't what matters.",
                source: "Panos Kokmotos",
                color: "orange"
            }
        ];

        let currentFilter = 'all';

        function createCards(filter = 'all') {
            const container = document.getElementById('cardsContainer');
            container.innerHTML = '';
            
            const filteredCards = filter === 'all' 
                ? cards 
                : cards.filter(card => card.source === filter);
            
            filteredCards.forEach((card, index) => {
                const cardEl = document.createElement('div');
                cardEl.className = 'card';
                cardEl.setAttribute('data-color', card.color);
                cardEl.innerHTML = `
                    <div class="card-number">Card ${String(index + 1).padStart(2, '0')}</div>
                    <div class="card-quote">"${card.quote}"</div>
                    <div class="card-source">${card.source}</div>
                    <div class="card-buttons">
                        <button class="card-btn copy" onclick="copyToClipboard('${card.quote.replace(/'/g, "\\'")}', '${card.source}')">
                            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                            Copy
                        </button>
                        <button class="card-btn share" onclick="shareOnTwitter('${encodeURIComponent(`"${card.quote}" — ${card.source}`)}')">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
                            Tweet
                        </button>
                        <button class="card-btn share" onclick="shareOnLinkedIn()">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
                            Share
                        </button>
                    </div>
                `;
                container.appendChild(cardEl);
            });
        }

        function copyToClipboard(quote, source) {
            const fullText = `"${quote}"\n\n— ${source}\n\nFrom "Being Genuinely Useful in an AI World"\nhttps://openclaw.ai/book`;
            navigator.clipboard.writeText(fullText).then(() => {
                showToast('Copied to clipboard!');
            });
        }

        function shareOnTwitter(text) {
            const url = `https://twitter.com/intent/tweet?text=${text}%0A%0AFrom%20%22Being%20Genuinely%20Useful%22&url=https%3A%2F%2Fopenclaw.ai%2Fbook`;
            window.open(url, '_blank', 'width=550,height=420');
        }

        function shareOnLinkedIn() {
            const url = `https://www.linkedin.com/sharing/share-offsite/?url=https://openclaw.ai/book`;
            window.open(url, '_blank', 'width=550,height=420');
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            const toastMessage = document.getElementById('toastMessage');
            toastMessage.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2500);
        }

        // Filter functionality
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                const filter = btn.getAttribute('data-filter');
                createCards(filter);
            });
        });

        // Initialize
        createCards();
    </script>
</body>
</html>
