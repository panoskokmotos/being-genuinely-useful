<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Share Cards - Being Genuinely Useful</title>
    <meta name="description" content="Shareable quote cards from Being Genuinely Useful in an AI World. Copy, tweet, or download as an image.">
    <meta property="og:type" content="website">
    <meta property="og:title" content="Share Cards - Being Genuinely Useful">
    <meta property="og:description" content="Shareable quote cards from Being Genuinely Useful in an AI World. Copy, tweet, or download as an image.">
    <meta property="og:url" content="https://beinggenuinelyuseful.com/cards">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Share Cards - Being Genuinely Useful">
    <meta name="twitter:description" content="Shareable quote cards from Being Genuinely Useful in an AI World.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Newsreader:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a0a;
            --bg-secondary: #141414;
            --bg-tertiary: #1a1a1a;
            --text-primary: #fafafa;
            --text-secondary: #a1a1aa;
            --text-muted: #71717a;
            --accent: #22c55e;
            --accent-hover: #16a34a;
            --border: #27272a;
            --border-subtle: #1f1f23;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
        }

        /* Navigation */
        .nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-subtle);
            padding: 0 24px;
        }

        .nav-inner {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 64px;
        }

        .nav-logo {
            font-family: 'Newsreader', serif;
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text-primary);
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            gap: 32px;
            list-style: none;
        }

        .nav-links a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.875rem;
            font-weight: 500;
            transition: color 0.2s;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: var(--text-primary);
        }

        .nav-cta {
            background: var(--accent);
            color: var(--bg-primary);
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 0.875rem;
            font-weight: 600;
            text-decoration: none;
            transition: background 0.2s;
        }

        .nav-cta:hover {
            background: var(--accent-hover);
        }

        /* Main */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 120px 24px 80px;
        }

        /* Header */
        .page-header {
            text-align: center;
            margin-bottom: 64px;
        }

        .page-header h1 {
            font-family: 'Newsreader', serif;
            font-size: clamp(2rem, 5vw, 3rem);
            font-weight: 500;
            margin-bottom: 16px;
        }

        .page-header p {
            color: var(--text-secondary);
            font-size: 1.125rem;
            max-width: 500px;
            margin: 0 auto;
        }

        /* Filter Pills */
        .filters {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-bottom: 48px;
            flex-wrap: wrap;
        }

        .filter-btn {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 8px 16px;
            border-radius: 100px;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .filter-btn:hover {
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }

        .filter-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: var(--bg-primary);
        }

        /* Cards Grid */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 24px;
        }

        /* Card */
        .card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 28px;
            display: flex;
            flex-direction: column;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--card-accent, var(--accent));
        }

        .card:hover {
            transform: translateY(-4px);
            border-color: var(--card-accent, var(--accent));
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .card[data-color="green"] { --card-accent: #22c55e; }
        .card[data-color="blue"] { --card-accent: #3b82f6; }
        .card[data-color="orange"] { --card-accent: #f59e0b; }
        .card[data-color="purple"] { --card-accent: #a855f7; }

        .card-number {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 16px;
        }

        .card-quote {
            font-family: 'Newsreader', serif;
            font-size: 1.25rem;
            font-style: italic;
            line-height: 1.5;
            color: var(--text-primary);
            flex-grow: 1;
            margin-bottom: 20px;
        }

        .card-source {
            font-size: 0.875rem;
            color: var(--text-muted);
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .card-source::before {
            content: '';
            width: 24px;
            height: 1px;
            background: var(--border);
        }

        .card-buttons {
            display: flex;
            gap: 8px;
        }

        .card-btn {
            flex: 1;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 10px 16px;
            border: none;
            border-radius: 8px;
            font-size: 0.8125rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .card-btn.copy {
            background: var(--accent);
            color: var(--bg-primary);
        }

        .card-btn.copy:hover {
            background: var(--accent-hover);
        }

        .card-btn.share {
            background: var(--bg-tertiary);
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }

        .card-btn.share:hover {
            background: var(--border);
            color: var(--text-primary);
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--bg-secondary);
            border: 1px solid var(--accent);
            color: var(--text-primary);
            padding: 16px 24px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 1000;
            opacity: 0;
            transition: all 0.3s ease;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .toast-icon {
            width: 20px;
            height: 20px;
            background: var(--accent);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .toast-icon svg {
            width: 12px;
            height: 12px;
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 64px 24px;
            border-top: 1px solid var(--border-subtle);
            color: var(--text-muted);
        }

        footer p {
            margin-bottom: 8px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .nav-links {
                display: none;
            }

            .container {
                padding: 100px 16px 60px;
            }

            .cards-grid {
                grid-template-columns: 1fr;
            }

            .card {
                padding: 24px;
            }

            .card-quote {
                font-size: 1.125rem;
            }
        }

        /* Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card {
            animation: fadeInUp 0.4s ease forwards;
            opacity: 0;
        }

        .card:nth-child(1) { animation-delay: 0.05s; }
        .card:nth-child(2) { animation-delay: 0.1s; }
        .card:nth-child(3) { animation-delay: 0.15s; }
        .card:nth-child(4) { animation-delay: 0.2s; }
        .card:nth-child(5) { animation-delay: 0.25s; }
        .card:nth-child(6) { animation-delay: 0.3s; }
        .card:nth-child(7) { animation-delay: 0.35s; }
        .card:nth-child(8) { animation-delay: 0.4s; }
        .card:nth-child(9) { animation-delay: 0.45s; }
        .card:nth-child(n+10) { animation-delay: 0.5s; }

        /* Success state for buttons */
        .card-btn.success {
            background: var(--accent) !important;
            color: var(--bg-primary) !important;
            border-color: var(--accent) !important;
        }

        /* Keyboard navigation */
        .card:focus-within {
            outline: 2px solid var(--accent);
            outline-offset: 4px;
        }

        /* Skip navigation */
        .skip-link {
            position: absolute;
            top: -100%;
            left: 0;
            background: var(--accent);
            color: var(--bg-primary);
            padding: 12px 24px;
            font-weight: 600;
            z-index: 9999;
            text-decoration: none;
            border-radius: 0 0 8px 0;
            transition: top 0.1s;
        }
        .skip-link:focus {
            top: 0;
        }
    </style>
</head>
<body>
    <a href="#main-content" class="skip-link">Skip to main content</a>
    <nav class="nav">
        <div class="nav-inner">
            <a href="/" class="nav-logo">Being Genuinely Useful</a>
            <ul class="nav-links">
                <li><a href="/#deutsch">Framework</a></li>
                <li><a href="/#systems">Systems</a></li>
                <li><a href="/#exercises">Exercises</a></li>
                <li><a href="/cards" class="active">Cards</a></li>
            </ul>
            <a href="/" class="nav-cta">Read the Book</a>
        </div>
    </nav>

    <main class="container" id="main-content">
        <header class="page-header">
            <h1>Share Cards</h1>
            <p>Click to copy. Share ideas that matter on Twitter, LinkedIn, and anywhere else.</p>
        </header>

        <div class="filters" role="tablist" aria-label="Filter by author">
            <button class="filter-btn active" role="tab" aria-selected="true" data-filter="all">All</button>
            <button class="filter-btn" role="tab" aria-selected="false" data-filter="Panos Kokmotos">Panos</button>
            <button class="filter-btn" role="tab" aria-selected="false" data-filter="David Deutsch">Deutsch</button>
            <button class="filter-btn" role="tab" aria-selected="false" data-filter="Naval Ravikant">Naval</button>
        </div>

        <div class="cards-grid" id="cardsContainer"></div>
    </main>

    <footer>
        <p>&copy; 2026 Panos Kokmotos &amp; Sophos</p>
        <p>Read, learn, build something useful.</p>
    </footer>

    <div class="toast" id="toast" role="alert" aria-live="assertive" aria-atomic="true">
        <span class="toast-icon">
            <svg aria-hidden="true" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"/></svg>
        </span>
        <span id="toastMessage">Copied to clipboard!</span>
    </div>

    <script>
        const cards = [
            { id: 0, quote: "The difference between a useful system and a useless one is not intelligence. It\u2019s specificity.", source: "Panos Kokmotos", color: "green" },
            { id: 1, quote: "If it applies everywhere, it applies nowhere. Specificity is the antidote to uselessness.", source: "Panos Kokmotos", color: "green" },
            { id: 2, quote: "A good explanation is hard to vary. Change any element and it breaks. The parts are essential.", source: "David Deutsch", color: "purple" },
            { id: 3, quote: "Good explanations don\u2019t just resist variation. They reach far beyond where they started.", source: "David Deutsch", color: "purple" },
            { id: 4, quote: "The most valuable knowledge can\u2019t be trained. It\u2019s specific, developed through curiosity and obsession.", source: "Naval Ravikant", color: "orange" },
            { id: 5, quote: "In an AI world, general knowledge is obsolete. Only specific knowledge from your obsessions remains valuable.", source: "Naval Ravikant", color: "orange" },
            { id: 6, quote: "Real usefulness is quiet. It does the work. It doesn\u2019t announce itself.", source: "Panos Kokmotos", color: "blue" },
            { id: 7, quote: "Most AI systems are optimized for engagement, not usefulness. These are opposites.", source: "Panos Kokmotos", color: "green" },
            { id: 8, quote: "Most problems don\u2019t need more information. They need better compression.", source: "Panos Kokmotos", color: "blue" },
            { id: 9, quote: "In-kind giving works because it respects expertise. The person on the ground knows what\u2019s needed.", source: "Panos Kokmotos", color: "green" },
            { id: 10, quote: "True usefulness means: You stay in control. I help you execute your judgment, not replace it.", source: "Panos Kokmotos", color: "blue" },
            { id: 11, quote: "The future isn\u2019t better engagement. It\u2019s transparent problems, better thinking, and knowledge at scale.", source: "Panos Kokmotos", color: "purple" },
            { id: 12, quote: "Knowledge grows through conjecture and criticism. Not through observation alone.", source: "David Deutsch", color: "purple" },
            { id: 13, quote: "Problems are soluble. There exists an explanation that hasn\u2019t been found yet.", source: "David Deutsch", color: "purple" },
            { id: 14, quote: "Be useful, not engaging. Build infrastructure, not platforms. Create knowledge, not content.", source: "Panos Kokmotos", color: "orange" },
            { id: 15, quote: "Compression is a human skill. AI can expand. Humans must compress.", source: "Panos Kokmotos", color: "blue" },
            { id: 16, quote: "A useful AI system gives you one clear answer and then gets out of the way.", source: "Panos Kokmotos", color: "green" },
            { id: 17, quote: "You can measure what\u2019s easy. But that usually isn\u2019t what matters.", source: "Panos Kokmotos", color: "orange" }
        ];

        // ── Card rendering ────────────────────────────────────────────────────

        function createCards(filter) {
            const container = document.getElementById('cardsContainer');
            container.innerHTML = '';

            const filtered = filter === 'all' ? cards : cards.filter(c => c.source === filter);

            filtered.forEach((card, index) => {
                const el = document.createElement('div');
                el.className = 'card';
                el.setAttribute('data-color', card.color);
                el.setAttribute('data-card-id', card.id);
                // Quotes are rendered as text nodes via textContent below — no interpolation into HTML
                el.innerHTML = `
                    <div class="card-number">Card ${String(index + 1).padStart(2, '0')}</div>
                    <div class="card-quote"></div>
                    <div class="card-source"></div>
                    <div class="card-buttons">
                        <button class="card-btn copy" data-action="copy" aria-label="Copy quote to clipboard">
                            <svg aria-hidden="true" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                            Copy
                        </button>
                        <button class="card-btn share" data-action="tweet" aria-label="Share on Twitter">
                            <svg aria-hidden="true" width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
                            Tweet
                        </button>
                        <button class="card-btn share" data-action="image" aria-label="Download as image">
                            <svg aria-hidden="true" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
                            Image
                        </button>
                    </div>
                `;
                // Set text safely via textContent to avoid XSS
                el.querySelector('.card-quote').textContent = '\u201c' + card.quote + '\u201d';
                el.querySelector('.card-source').textContent = card.source;
                container.appendChild(el);
            });
        }

        // ── Event delegation — one listener handles all card buttons ──────────

        document.getElementById('cardsContainer').addEventListener('click', e => {
            const btn = e.target.closest('[data-action]');
            if (!btn) return;
            const cardEl = btn.closest('[data-card-id]');
            if (!cardEl) return;
            const card = cards.find(c => c.id === parseInt(cardEl.dataset.cardId, 10));
            if (!card) return;

            const action = btn.dataset.action;
            if (action === 'copy') copyToClipboard(card.quote, card.source);
            else if (action === 'tweet') shareOnTwitter(card.quote, card.source);
            else if (action === 'image') downloadCardImage(card.quote, card.source, card.color);
        });

        // ── Actions ───────────────────────────────────────────────────────────

        function copyToClipboard(quote, source) {
            const fullText = `\u201c${quote}\u201d\n\n\u2014 ${source}\n\nFrom \u201cBeing Genuinely Useful in an AI World\u201d\n${window.location.origin}`;

            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(fullText).then(() => {
                    showToast('Copied to clipboard!');
                }).catch(() => {
                    fallbackCopy(fullText);
                });
            } else {
                fallbackCopy(fullText);
            }
        }

        function fallbackCopy(text) {
            try {
                const textarea = document.createElement('textarea');
                textarea.value = text;
                textarea.style.position = 'fixed';
                textarea.style.opacity = '0';
                document.body.appendChild(textarea);
                textarea.focus();
                textarea.select();
                const ok = document.execCommand('copy');
                document.body.removeChild(textarea);
                if (ok) {
                    showToast('Copied to clipboard!');
                } else {
                    showToast('Auto-copy failed \u2014 press Ctrl+C / \u2318C to copy.');
                }
            } catch (_) {
                showToast('Auto-copy failed \u2014 press Ctrl+C / \u2318C to copy.');
            }
        }

        function shareOnTwitter(quote, source) {
            const text = encodeURIComponent(`\u201c${quote}\u201d \u2014 ${source}`);
            const url = `https://twitter.com/intent/tweet?text=${text}%0A%0AFrom%20%22Being%20Genuinely%20Useful%22&url=${encodeURIComponent(window.location.origin)}`;
            window.open(url, '_blank', 'width=550,height=420,noopener,noreferrer');
        }

        async function downloadCardImage(quote, source, color) {
            const canvas = document.createElement('canvas');
            canvas.width = 1200;
            canvas.height = 630;
            const ctx = canvas.getContext('2d');

            if (!ctx) {
                showToast('Image download not supported in this browser.');
                return;
            }

            try {
                const colorMap = { green: '#22c55e', blue: '#3b82f6', orange: '#f59e0b', purple: '#a855f7' };
                const accent = colorMap[color] || colorMap.green;

                ctx.fillStyle = '#0a0a0a';
                ctx.fillRect(0, 0, 1200, 630);

                ctx.fillStyle = accent;
                ctx.fillRect(0, 0, 1200, 6);

                ctx.fillStyle = '#fafafa';
                ctx.font = 'italic 36px Georgia, serif';
                const words = ('\u201c' + quote).split(' ');
                let line = '';
                let y = 200;
                words.forEach(word => {
                    const testLine = line + word + ' ';
                    if (ctx.measureText(testLine).width > 1040) {
                        ctx.fillText(line.trim(), 80, y);
                        line = word + ' ';
                        y += 50;
                    } else {
                        line = testLine;
                    }
                });
                ctx.fillText(line.trim() + '\u201d', 80, y);

                ctx.fillStyle = '#71717a';
                ctx.font = '24px -apple-system, sans-serif';
                ctx.fillText('\u2014 ' + source, 80, y + 80);

                ctx.fillStyle = accent;
                ctx.font = 'bold 20px -apple-system, sans-serif';
                ctx.fillText('Being Genuinely Useful', 80, 560);
                ctx.fillStyle = '#71717a';
                ctx.font = '18px -apple-system, sans-serif';
                ctx.fillText(window.location.origin, 80, 590);

                const link = document.createElement('a');
                link.download = 'share-card.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
                showToast('Image downloaded!');
            } catch (_) {
                showToast('Image download failed. Please try again.');
            }
        }

        // ── Toast ─────────────────────────────────────────────────────────────

        function showToast(message) {
            const toast = document.getElementById('toast');
            document.getElementById('toastMessage').textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);
        }

        // ── Filter with URL state ─────────────────────────────────────────────

        function applyFilter(filter) {
            document.querySelectorAll('.filter-btn').forEach(b => {
                const active = b.dataset.filter === filter;
                b.classList.toggle('active', active);
                b.setAttribute('aria-selected', active ? 'true' : 'false');
            });
            createCards(filter);
            try {
                const params = filter === 'all' ? '' : '?filter=' + encodeURIComponent(filter);
                history.replaceState(null, '', location.pathname + params);
            } catch (_) {}
        }

        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => applyFilter(btn.dataset.filter));
        });

        // Initialize — restore filter from URL if present
        const initialFilter = new URLSearchParams(location.search).get('filter') || 'all';
        applyFilter(initialFilter);
    </script>
</body>
</html>
