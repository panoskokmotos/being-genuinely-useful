<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Share Cards - Being Genuinely Useful</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Georgia', serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #e2e8f0;
            padding: 40px 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            margin-bottom: 40px;
            color: #3b82f6;
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .card {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.1), rgba(16, 185, 129, 0.1));
            border: 2px solid #3b82f6;
            border-radius: 12px;
            padding: 25px;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            min-height: 250px;
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(59, 130, 246, 0.2);
            border-color: #10b981;
        }

        .card-quote {
            font-size: 1.1em;
            font-style: italic;
            margin-bottom: 20px;
            color: #e2e8f0;
            flex-grow: 1;
            display: flex;
            align-items: center;
        }

        .card-source {
            font-size: 0.85em;
            color: #94a3b8;
            margin-bottom: 15px;
        }

        .card-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .share-btn {
            flex: 1;
            min-width: 100px;
            padding: 8px 12px;
            border: none;
            border-radius: 6px;
            background: #3b82f6;
            color: white;
            cursor: pointer;
            font-size: 0.9em;
            font-weight: 600;
            transition: all 0.3s;
        }

        .share-btn:hover {
            background: #2563eb;
        }

        .copy-btn {
            background: #10b981;
        }

        .copy-btn:hover {
            background: #059669;
        }

        .card.blue { border-color: #3b82f6; }
        .card.green { border-color: #10b981; }
        .card.purple { border-color: #8b5cf6; }
        .card.orange { border-color: #f59e0b; }

        .card-number {
            font-size: 0.8em;
            color: #64748b;
            margin-bottom: 10px;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #10b981;
            color: white;
            padding: 15px 20px;
            border-radius: 6px;
            display: none;
            z-index: 1000;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .toast.show {
            display: block;
        }

        .back-link {
            color: #3b82f6;
            text-decoration: none;
            margin-bottom: 40px;
            display: inline-block;
        }

        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="/" class="back-link">← Back to Book</a>
        <h1>🎴 Shareable Cards</h1>
        <p style="text-align: center; color: #cbd5e1; margin-bottom: 40px;">Click to copy. Share anywhere.</p>

        <div class="cards-grid" id="cardsContainer"></div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const cards = [
            {
                quote: "The difference between a useful system and a useless one is not intelligence. It's specificity.",
                source: "Panos Kokmotos",
                color: "blue"
            },
            {
                quote: "If it applies everywhere, it applies nowhere. Specificity is the antidote to uselessness.",
                source: "Panos Kokmotos",
                color: "green"
            },
            {
                quote: "A good explanation is hard to vary. Change any element and it breaks. The parts are essential.",
                source: "David Deutsch",
                color: "purple"
            },
            {
                quote: "Good explanations don't just resist variation. They reach far beyond where they started.",
                source: "David Deutsch",
                color: "purple"
            },
            {
                quote: "The most valuable knowledge can't be trained. It's specific, developed through curiosity and obsession.",
                source: "Naval Ravikant",
                color: "orange"
            },
            {
                quote: "In an AI world, general knowledge is obsolete. Only specific knowledge from your obsessions remains valuable.",
                source: "Naval Ravikant",
                color: "orange"
            },
            {
                quote: "Real usefulness is quiet. It does the work. It doesn't announce itself.",
                source: "Panos Kokmotos",
                color: "blue"
            },
            {
                quote: "Most AI systems are optimized for engagement, not usefulness. These are opposites.",
                source: "Panos Kokmotos",
                color: "green"
            },
            {
                quote: "Most problems don't need more information. They need better compression.",
                source: "Panos Kokmotos",
                color: "blue"
            },
            {
                quote: "In-kind giving works because it respects expertise. The person on the ground knows what's needed.",
                source: "Panos Kokmotos",
                color: "green"
            },
            {
                quote: "True usefulness means: You stay in control. I help you execute your judgment, not replace it.",
                source: "Panos Kokmotos",
                color: "blue"
            },
            {
                quote: "The future isn't better engagement. It's transparent problems, better thinking, and knowledge at scale.",
                source: "Panos Kokmotos",
                color: "purple"
            },
            {
                quote: "Knowledge grows through conjecture and criticism. Not through observation alone.",
                source: "David Deutsch",
                color: "purple"
            },
            {
                quote: "Problems are soluble. There exists an explanation that hasn't been found yet.",
                source: "David Deutsch",
                color: "purple"
            },
            {
                quote: "Be useful, not engaging. Build infrastructure, not platforms. Create knowledge, not content.",
                source: "Panos Kokmotos",
                color: "orange"
            },
            {
                quote: "Compression is a human skill. AI can expand. Humans must compress.",
                source: "Panos Kokmotos",
                color: "blue"
            },
            {
                quote: "A useful AI system gives you one clear answer and then gets out of the way.",
                source: "Panos Kokmotos",
                color: "green"
            },
            {
                quote: "You can measure what's easy. But that usually isn't what matters.",
                source: "Panos Kokmotos",
                color: "orange"
            }
        ];

        function createCards() {
            const container = document.getElementById('cardsContainer');
            cards.forEach((card, index) => {
                const cardEl = document.createElement('div');
                cardEl.className = `card ${card.color}`;
                cardEl.innerHTML = `
                    <div class="card-number">Card ${index + 1}</div>
                    <div class="card-quote">"${card.quote}"</div>
                    <div class="card-source">— ${card.source}</div>
                    <div class="card-buttons">
                        <button class="share-btn copy-btn" onclick="copyToClipboard('${card.quote}')">📋 Copy</button>
                        <button class="share-btn" onclick="shareOnTwitter('${encodeURIComponent(`"${card.quote}" — ${card.source}`)}')" title="Share on Twitter">𝕏 Tweet</button>
                        <button class="share-btn" onclick="shareOnLinkedIn('${encodeURIComponent(`"${card.quote}" — ${card.source}`)}')" title="Share on LinkedIn">💼 Share</button>
                    </div>
                `;
                container.appendChild(cardEl);
            });
        }

        function copyToClipboard(text) {
            const fullText = `"${text}" — Being Genuinely Useful in an AI World\n\nRead: https://openclaw.ai/book`;
            navigator.clipboard.writeText(fullText).then(() => {
                showToast('✓ Copied to clipboard!');
            });
        }

        function shareOnTwitter(text) {
            const url = `https://twitter.com/intent/tweet?text=${text}%20%E2%80%94%20Check%20out%20%22Being%20Genuinely%20Useful%20in%20an%20AI%20World%22&url=https%3A%2F%2Fopenclaw.ai%2Fbook`;
            window.open(url, '_blank');
        }

        function shareOnLinkedIn(text) {
            const url = `https://www.linkedin.com/sharing/share-offsite/?url=https://openclaw.ai/book`;
            window.open(url, '_blank');
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2000);
        }

        createCards();
    </script>
</body>
</html>
